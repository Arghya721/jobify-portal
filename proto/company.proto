syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.jobify.api.grpc";
option java_outer_classname = "CompanyProto";

import "google/protobuf/empty.proto";

service CompanyService {
  rpc GetAllCompanies (google.protobuf.Empty) returns (GetAllCompaniesResponse);
}

message CompanyMessage {
  int64 id = 1;
  string name = 2;
  string source = 3;
}

message GetAllCompaniesResponse {
  repeated CompanyMessage companies = 1;
}
